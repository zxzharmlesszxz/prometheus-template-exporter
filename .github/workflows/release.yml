name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver module tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  COVERAGE_THRESHOLD: "90.0"

jobs:
  release:
    name: Release Go module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release input
        env:
          VERSION: ${{ inputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "Release workflow must run from $DEFAULT_BRANCH, got $GITHUB_REF_NAME"
            exit 1
          fi

          if ! [[ "$VERSION" =~ ^v(0|1)\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "version must look like v0.1.0, v1.2.3, or v1.2.3-rc.1"
            echo "v2+ requires a /v2 module path before it can be released"
            exit 1
          fi

      - name: Check tag does not exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "tag already exists: $VERSION"
            exit 1
          fi

      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run checks
        run: make check GO=go GOFMT=gofmt COVERAGE_THRESHOLD="$COVERAGE_THRESHOLD"

      - name: Create annotated tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "$VERSION" --verify-tag --generate-notes --title "$VERSION"
