name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver module tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  COVERAGE_THRESHOLD: "90.0"
  SCAFFOLD_REPOSITORY: zxzharmlesszxz/prometheus-exporter-scaffold

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release Go module
    runs-on: ubuntu-24.04
    container:
      image: golang:1.26.3-alpine

    steps:
      - name: Prepare Alpine
        shell: sh
        run: apk add --no-cache bash build-base git github-cli make

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release input
        env:
          VERSION: ${{ inputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "Release workflow must run from $DEFAULT_BRANCH, got $GITHUB_REF_NAME"
            exit 1
          fi

          if ! [[ "$VERSION" =~ ^v(0|1)\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "version must look like v0.1.0, v1.2.3, or v1.2.3-rc.1"
            echo "v2+ requires a /v2 module path before it can be released"
            exit 1
          fi

      - name: Check tag does not exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "tag already exists: $VERSION"
            exit 1
          fi

      - name: Verify module files
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cp go.mod "$tmp/go.mod"
          cp go.sum "$tmp/go.sum"
          go mod tidy
          diff -u "$tmp/go.mod" go.mod
          diff -u "$tmp/go.sum" go.sum

      - name: Run checks
        run: make check GO=go GOFMT=gofmt COVERAGE_THRESHOLD="$COVERAGE_THRESHOLD"

      - name: Create annotated tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "$VERSION" --verify-tag --generate-notes --title "$VERSION"

  update-scaffold:
    name: Update exporter scaffold
    runs-on: ubuntu-24.04
    container:
      image: golang:1.26.3-alpine
    needs:
      - release

    steps:
      - name: Prepare Alpine
        shell: sh
        run: apk add --no-cache bash build-base git github-cli make perl

      - name: Validate scaffold token
        env:
          SCAFFOLD_REPO_TOKEN: ${{ secrets.SCAFFOLD_REPO_TOKEN }}
        run: |
          if [ -z "$SCAFFOLD_REPO_TOKEN" ]; then
            echo "SCAFFOLD_REPO_TOKEN is required to update $SCAFFOLD_REPOSITORY"
            exit 1
          fi

      - name: Checkout scaffold
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SCAFFOLD_REPOSITORY }}
          token: ${{ secrets.SCAFFOLD_REPO_TOKEN }}
          path: scaffold

      - name: Update framework version
        working-directory: scaffold
        env:
          VERSION: ${{ inputs.version }}
          GOPROXY: direct
        run: |
          if [ -f framework.version ]; then
            echo "$VERSION" > framework.version
          fi

          go mod edit \
            -require=github.com/zxzharmlesszxz/prometheus-template-exporter@"$VERSION" \
            template/go.mod
          (cd template && go mod tidy)

          find . -type f \( -name '*.md' -o -name '*.go' -o -name '*.mod' \) -print0 \
            | xargs -0 perl -0pi -e 's#github\.com/zxzharmlesszxz/prometheus-template-exporter v[0-9A-Za-z.+-]+#github.com/zxzharmlesszxz/prometheus-template-exporter $ENV{VERSION}#g'

      - name: Verify rendered scaffold
        working-directory: scaffold
        env:
          GOPROXY: direct
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          scripts/render.sh \
            --project-name prometheus-demo-exporter \
            --module github.com/zxzharmlesszxz/prometheus-demo-exporter \
            --description "Prometheus Demo Exporter" \
            --feature-name demo \
            --namespace demo_exporter \
            --port 9888 \
            --target-dir "$tmp"
          (cd "$tmp" && go mod tidy && make go-check GO=go GOFMT=gofmt)

      - name: Open scaffold update pull request
        working-directory: scaffold
        env:
          GH_TOKEN: ${{ secrets.SCAFFOLD_REPO_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "scaffold already uses $VERSION"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          branch="update-template-exporter-${VERSION#v}"
          base="$(gh repo view "$SCAFFOLD_REPOSITORY" --json defaultBranchRef -q .defaultBranchRef.name)"
          git switch -c "$branch"
          git add .
          git commit -m "scaffold: update framework to $VERSION"
          git push --force-with-lease origin "$branch"

          gh pr create \
            --repo "$SCAFFOLD_REPOSITORY" \
            --base "$base" \
            --head "$branch" \
            --title "Update prometheus-template-exporter to $VERSION" \
            --body "Updates generated exporters to use prometheus-template-exporter $VERSION."
