services:
  exporter:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        BRANCH: ${BRANCH:-local}
        REVISION: ${REVISION:-local}
        BUILD_USER: ${BUILD_USER:-docker-compose}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    ports:
      - "9900:9900"

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    depends_on:
      - exporter
    volumes:
      - ./examples/prometheus/:/etc/prometheus/:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    configs:
      - source: grafana_prometheus_datasource
        target: /etc/grafana/provisioning/datasources/prometheus.yml
      - source: grafana_dashboards_provider
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
    volumes:
      - ./examples/grafana/:/var/lib/grafana/dashboards/
    depends_on:
      prometheus:
        condition: service_started

configs:
  grafana_prometheus_datasource:
    content: |
      apiVersion: 1

      datasources:
        - name: Prometheus
          uid: DS_PROMETHEUS
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false
  grafana_dashboards_provider:
    content: |
      apiVersion: 1

      providers:
        - name: Exporter Framework
          orgId: 1
          folder: Framework
          type: file
          disableDeletion: true
          editable: false
          updateIntervalSeconds: 30
          options:
            path: /var/lib/grafana/dashboards
