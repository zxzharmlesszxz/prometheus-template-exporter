---

image: golang:1.26

variables:
  COVERAGE_THRESHOLD: "90.0"

stages:
  - test
  - build

test:
  stage: test
  before_script:
    - command -v make >/dev/null || (apt-get update && apt-get install -y --no-install-recommends make)
  script:
    - make check GO=go COVERAGE_THRESHOLD="$COVERAGE_THRESHOLD"
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    paths:
      - coverage.out
      - coverage.txt
    expire_in: 1 week

binary-build:
  stage: build
  script:
    - VERSION_VALUE="ci"
    - BRANCH_VALUE="${CI_COMMIT_BRANCH:-${CI_COMMIT_REF_NAME:-detached}}"
    - REVISION_VALUE="${CI_COMMIT_SHORT_SHA:-${CI_COMMIT_SHA:-dev}}"
    - BUILD_USER_VALUE="${GITLAB_USER_LOGIN:-gitlab-ci}"
    - BUILD_DATE_VALUE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - >
      go build
      -trimpath
      -ldflags "-s -w
      -X github.com/prometheus/common/version.Version=${VERSION_VALUE}
      -X github.com/prometheus/common/version.Branch=${BRANCH_VALUE}
      -X github.com/prometheus/common/version.Revision=${REVISION_VALUE}
      -X github.com/prometheus/common/version.BuildUser=${BUILD_USER_VALUE}
      -X github.com/prometheus/common/version.BuildDate=${BUILD_DATE_VALUE}"
      -o /tmp/prometheus-template-exporter
      ./cmd
    - /tmp/prometheus-template-exporter --version

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  script:
    - VERSION_VALUE="ci"
    - BRANCH_VALUE="${CI_COMMIT_BRANCH:-${CI_COMMIT_REF_NAME:-detached}}"
    - REVISION_VALUE="${CI_COMMIT_SHORT_SHA:-${CI_COMMIT_SHA:-dev}}"
    - BUILD_USER_VALUE="${GITLAB_USER_LOGIN:-gitlab-ci}"
    - BUILD_DATE_VALUE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - >
      docker build
      --build-arg VERSION=${VERSION_VALUE}
      --build-arg BRANCH=${BRANCH_VALUE}
      --build-arg REVISION=${REVISION_VALUE}
      --build-arg BUILD_USER=${BUILD_USER_VALUE}
      --build-arg BUILD_DATE=${BUILD_DATE_VALUE}
      -t prometheus-template-exporter:$CI_COMMIT_SHA
      .
